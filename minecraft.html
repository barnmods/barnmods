<!DOCTYPE html>
<html>
<head>
<title>Minecraft Products</title>
<style>
body { font-family: Arial; background: black; color: white; }
.products { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; padding: 40px; }
.card { background:#1a1a1a; padding:15px; border-radius:10px; }
button { width:100%; padding:10px; background:red; border:none; color:white; cursor:pointer; }
</style>
</head>

<body>

<h1 style="text-align:center;">Minecraft Products</h1>

<div class="products">
    <div class="card">
        <h3>Minecraft Premium Account</h3>
        <p>$6.99</p>
        <button onclick="addToCart('Minecraft Account', 6.99)">Add</button>
    </div>

    <div class="card">
        <h3>Mod Pack Bundle</h3>
        <p>$4.99</p>
        <button onclick="addToCart('Minecraft Mods', 4.99)">Add</button>
    </div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
function addToCart(name, price) {
    cart.push({ name, price });
    localStorage.setItem("cart", JSON.stringify(cart));
}
</script>

</body>
</html>
