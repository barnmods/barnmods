<!DOCTYPE html>
<html>
<head>
<title>Your Cart</title>

<style>
body {
    font-family: Arial;
    background: black;
    color: white;
}

/* TITLE */
h1 {
    text-align: center;
    margin: 20px;
}

/* ITEM */
.item {
    background: #1a1a1a;
    margin: 10px;
    padding: 15px;
    border-radius: 10px;

    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* BUTTONS */
button {
    padding: 8px 12px;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

.remove {
    background: red;
    color: white;
}

.clear {
    display: block;
    margin: 20px auto;
    background: darkred;
    color: white;
    padding: 10px 20px;
}

.total {
    text-align: center;
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>Your Cart</h1>

<div id="cart-items"></div>

<h2 class="total" id="total"></h2>

<button class="clear" onclick="clearCart()">Clear Cart</button>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let container = document.getElementById("cart-items");

function renderCart() {
    container.innerHTML = "";
    let total = 0;

    cart.forEach((item, index) => {
        let div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <span>${item.name} - $${item.price}</span>
            <button class="remove" onclick="removeItem(${index})">Remove</button>
        `;

        container.appendChild(div);
        total += item.price;
    });

    document.getElementById("total").innerText = "Total: $" + total.toFixed(2);
}

/* ❌ REMOVE ITEM */
function removeItem(index) {
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

/* 🧹 CLEAR CART */
function clearCart() {
    cart = [];
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

/* INITIAL LOAD */
renderCart();
</script>

</body>
</html>
