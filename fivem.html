<!DOCTYPE html>
<html>
<head>
<title>FiveM Products</title>
<style>
body { font-family: Arial; background:black; color:white; }
.products { display:grid; gap:20px; padding:40px; }
.card { background:#1a1a1a; padding:15px; border-radius:10px; }
button { width:100%; padding:10px; background:red; color:white; border:none; }
</style>
</head>

<body>

<h1 style="text-align:center;">FiveM Products</h1>

<div class="products">
    <div class="card">
        <h3>FiveM Account</h3>
        <p>$6.99</p>
        <button onclick="addToCart('FiveM Account', 6.99)">Add</button>
    </div>

    <div class="card">
        <h3>FiveM Server Pack</h3>
        <p>$9.99</p>
        <button onclick="addToCart('FiveM Pack', 9.99)">Add</button>
    </div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
function addToCart(name, price) {
    cart.push({ name, price });
    localStorage.setItem("cart", JSON.stringify(cart));
}
</script>

</body>
</html>
