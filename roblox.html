<!DOCTYPE html>
<html>
<head>
<title>Roblox Products</title>
<style>
body { font-family: Arial; background: black; color: white; }
.products { display: grid; gap:20px; padding:40px; }
.card { background:#1a1a1a; padding:15px; border-radius:10px; }
button { width:100%; padding:10px; background:red; border:none; color:white; }
</style>
</head>

<body>

<h1 style="text-align:center;">Roblox Products</h1>

<div class="products">
    <div class="card">
        <h3>Roblox Account</h3>
        <p>$5.99</p>
        <button onclick="addToCart('Roblox Account', 5.99)">Add</button>
    </div>

    <div class="card">
        <h3>Robux Pack</h3>
        <p>$3.99</p>
        <button onclick="addToCart('Robux Pack', 3.99)">Add</button>
    </div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
function addToCart(name, price) {
    cart.push({ name, price });
    localStorage.setItem("cart", JSON.stringify(cart));
}
</script>

</body>
</html>
